services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    volumes:
      - ./data:/app/data
      - ./backend/uploads:/app/backend/uploads
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "5173:80"
